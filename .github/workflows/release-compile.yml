# 编译并发布全 JSON 发行包（中英对照，无向量）
name: release-compile

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["compile-daily"]
    types: [completed]

concurrency:
  group: mcdb-dist-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync main
        run: |
          git checkout -B main
          git pull --rebase origin main

      - name: Compile + pack
        run: |
          python scripts/compile_dist.py
          python scripts/pack_release.py

      - name: Read manifest
        id: meta
        run: |
          VER=$(python -c "import json; print(json.load(open('release/manifest.json'))['version'])")
          STAMP=$(python -c "import json; print((json.load(open('release/manifest.json')).get('built_at') or '')[:10].replace('-',''))")
          COUNT=$(python -c "import json; print(json.load(open('release/manifest.json')).get('pair_count'))")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "tag=dist-$STAMP-$VER" >> "$GITHUB_OUTPUT"

      - name: Commit and push dist JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/version.json dist/exact_titles.json dist/bilingual.jsonl
          git rm -r --cached dist/semantic dist/semantic_meta.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No tracked dist changes"
            exit 0
          fi
          git commit -m "chore(dist): release compile ${{ steps.meta.outputs.tag }}"
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}/5"
            if git pull --rebase --autostash origin main && git push origin main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 15))
          done
          echo "::error::Failed to push dist commit after 5 attempts" >&2
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdb-release-${{ steps.meta.outputs.stamp }}
          path: release/
          retention-days: 30

      - name: Publish GitHub Release (dated)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.stamp }} (${{ steps.meta.outputs.count }} pairs)
          body: |
            全 JSON 发行包（标题对照，无向量）

            - **version**: `${{ steps.meta.outputs.version }}`
            - **pairs**: ${{ steps.meta.outputs.count }}
            - `mcdb-*.zip`：完整包（推荐）
            - `bilingual.jsonl`：中英对照
            - `exact_titles.json`：精确替换
          files: |
            release/mcdb-*.zip
            release/bilingual.jsonl
            release/exact_titles.json
            release/version.json
          fail_on_unmatched_files: true

      - name: Refresh rolling latest-dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=latest-dist
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            release/mcdb-*.zip \
            release/bilingual.jsonl \
            release/exact_titles.json \
            release/version.json \
            --title "latest-dist (${{ steps.meta.outputs.count }} pairs)" \
            --notes "滚动最新全 JSON 发行包（无向量）。对应 ${{ steps.meta.outputs.tag }}。" \
            --latest=false
