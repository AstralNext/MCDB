# 每小时用 Edge 公共翻译处理一批标题；文件锁 + concurrency 防冲突；不覆盖 reviewed
name: translate-hourly

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "本小时处理条数"
        required: false
        default: "40"

concurrency:
  group: translate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore catalog.db
        uses: actions/cache@v4
        with:
          path: data/catalog.db
          key: catalog-db-${{ github.run_id }}
          restore-keys: |
            catalog-db-

      - name: Translate batch (Edge)
        env:
          BATCH: ${{ github.event.inputs.batch || '40' }}
        run: |
          python scripts/translate_edge.py \
            --db data/catalog.db \
            --batch "$BATCH" \
            --owner "gha-${{ github.run_id }}"

      - name: Commit progress
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review state/translate_progress.json state/translate.lock || true
          # 锁文件不应提交；确保忽略
          git reset HEAD state/translate.lock 2>/dev/null || true
          rm -f state/translate.lock
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(i18n): edge translate hourly batch"
            git pull --rebase --autostash origin HEAD || true
            git push
          fi
