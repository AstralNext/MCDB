# 每周维护：校验 + JSON 重编译
name: maintain-weekly

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

concurrency:
  group: maintain
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate
        run: python scripts/validate.py

      - name: Recompile JSON dist
        run: python scripts/compile_dist.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/version.json dist/exact_titles.json dist/bilingual.jsonl || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(dist): weekly recompile"
            git pull --rebase --autostash origin HEAD || true
            git push
          fi
